<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards with Spaced Repetition</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6fb;text-align:center;padding:20px;direction:rtl;}
textarea{width:90%;height:150px;margin-bottom:15px;padding:10px;border-radius:8px;border:1px solid #ccc;}
button{padding:10px 15px;margin:5px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
#generate{background:#4CAF50;color:white;}
.card{margin:20px auto;width:300px;height:180px;background:white;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:center;padding:15px;cursor:pointer;transition:0.3s;font-size:18px;}
.hidden{display:none;}
.again{background:#e74c3c;color:white;}
.good{background:#f39c12;color:white;}
.easy{background:#2ecc71;color:white;}
#score{margin-top:10px;font-weight:bold;}
</style>
</head>
<body>
<h2>فلاش كاردز مع التكرار المتباعد 🎓</h2>
<textarea id="input" placeholder="اكتبي كل سؤال | الجواب في سطر"></textarea><br>
<button id="generate">تحويل إلى بطاقات</button>
<div id="card" class="card hidden"></div>
<div id="controls" class="hidden">
<button class="again">Again</button>
<button class="good">Good</button>
<button class="easy">Easy</button>
</div>
<div id="score">النقاط: 0</div>

<script>
let cards = [];
let currentIndex = 0;
let showingAnswer = false;
let score = 0;

// تحميل البيانات من LocalStorage
if(localStorage.getItem('flashcards')){
    cards = JSON.parse(localStorage.getItem('flashcards'));
}

function saveProgress(){
    localStorage.setItem('flashcards', JSON.stringify(cards));
}

document.getElementById("generate").onclick = function(){
    const text = document.getElementById("input").value.trim();
    const lines = text.split("\n");
    cards = lines.map(line=>{
        let parts = line.split("|");
        return {
            question: parts[0]?.trim(),
            answer: parts[1]?.trim(),
            interval: 1, // أيام حتى المراجعة التالية
            repetition:0,
            easiness:2.5,
            due: Date.now()
        };
    }).filter(card=>card.question && card.answer);
    currentIndex = 0;
    score = 0;
    document.getElementById("score").innerText = "النقاط: " + score;
    if(cards.length>0){
        showCard();
        document.getElementById("card").classList.remove("hidden");
        document.getElementById("controls").classList.remove("hidden");
    }
    saveProgress();
};

function showCard(){
    showingAnswer = false;
    if(currentIndex>=cards.length){
        alert("انتهيت من جميع البطاقات 🎉");
        currentIndex = 0;
    }
    document.getElementById("card").innerText = cards[currentIndex].question;
}

document.getElementById("card").onclick = function(){
    if(!showingAnswer){
        document.getElementById("card").innerText = cards[currentIndex].answer;
        showingAnswer = true;
    }
};

// SM-2 algorithm (simplified)
function updateCard(ease){
    let card = cards[currentIndex];
    card.repetition++;
    if(card.repetition===1){
        card.interval = 1;
    } else if(card.repetition===2){
        card.interval = 6;
    } else {
        card.interval = Math.round(card.interval * card.easiness);
    }
    // تحديث easiness factor
    card.easiness = Math.max(1.3, card.easiness + (0.1 - (5 - ease)*(0.08 + (5 - ease)*0.02)));
    card.due = Date.now() + card.interval*24*60*60*1000;
    saveProgress();
}

function nextCard(ease){
    // زيادة النقاط حسب التقييم
    if(ease===5) score+=3;
    else if(ease===4) score+=2;
    else if(ease===3) score+=1;
    document.getElementById("score").innerText = "النقاط: " + score;

    updateCard(ease);
    // اختر البطاقة التالية الأقرب للوقت الحالي
    const dueCards = cards.filter(c=>c.due<=Date.now());
    if(dueCards.length>0){
        currentIndex = cards.indexOf(dueCards[0]);
    } else {
        currentIndex = 0;
    }
    showCard();
}

document.querySelector(".again").onclick = function(){ nextCard(0); };
document.querySelector(".good").onclick = function(){ nextCard(4); };
document.querySelector(".easy").onclick = function(){ nextCard(5); };

// إذا كان هناك بطاقات محفوظة سابقًا، عرض أول بطاقة مستحقة
window.onload = function(){
    if(cards.length>0){
        const dueCards = cards.filter(c=>c.due<=Date.now());
        if(dueCards.length>0){
            currentIndex = cards.indexOf(dueCards[0]);
            document.getElementById("card").classList.remove("hidden");
            document.getElementById("controls").classList.remove("hidden");
            showCard();
        }
    }
};
</script>
</body>
</html>
